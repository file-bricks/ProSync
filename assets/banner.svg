<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 340" width="100%" height="100%">
  <!-- Definitions for Gradients and Filters -->
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0814" />
      <stop offset="50%" stop-color="#120e2e" />
      <stop offset="100%" stop-color="#070510" />
    </linearGradient>

    <!-- Folder Body Gradient (Orange-to-Pink) -->
    <linearGradient id="folder-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FF7E40" />
      <stop offset="100%" stop-color="#FF2E93" />
    </linearGradient>

    <!-- Folder Tab Gradient (Yellow-to-Orange) -->
    <linearGradient id="tab-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFD000" />
      <stop offset="100%" stop-color="#FF7E40" />
    </linearGradient>

    <!-- Mirror Glass Gradient (Cyber Indigo) -->
    <linearGradient id="mirror-glass-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1e38" />
      <stop offset="50%" stop-color="#15152a" />
      <stop offset="100%" stop-color="#0b0b18" />
    </linearGradient>

    <!-- Metal Gradient (Gold/Bronze for Frame) -->
    <linearGradient id="metal-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFE57F" />
      <stop offset="30%" stop-color="#FFC107" />
      <stop offset="70%" stop-color="#FFA000" />
      <stop offset="100%" stop-color="#FF8F00" />
    </linearGradient>

    <!-- Brand Text Gradient -->
    <linearGradient id="brand-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF8A00" />
      <stop offset="100%" stop-color="#FF2E93" />
    </linearGradient>

    <!-- Glow Blur Filter -->
    <filter id="glow-blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="40" />
    </filter>
    
    <!-- Mirror Clip Path -->
    <clipPath id="mirror-clip">
      <circle cx="360" cy="170" r="68" />
    </clipPath>
  </defs>

  <!-- Background Card -->
  <rect x="0" y="0" width="1200" height="340" rx="24" fill="url(#bg-grad)" />
  <!-- Border Stroke for premium card look -->
  <rect x="1" y="1" width="1198" height="338" rx="23" fill="none" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1.5" />

  <!-- Ambient Glow Blobs -->
  <circle cx="360" cy="170" r="100" fill="#FF2E93" opacity="0.12" filter="url(#glow-blur)" />
  <circle cx="850" cy="170" r="120" fill="#3B82F6" opacity="0.1" filter="url(#glow-blur)" />

  <!-- ==================== LEFT SIDE: CHARACTER & MIRROR ==================== -->

  <!-- Real Folder Shadow -->
  <ellipse cx="190" cy="275" rx="55" ry="8" fill="#000000" fill-opacity="0.4" />

  <!-- Mirror Stand & Base -->
  <ellipse cx="360" cy="275" rx="45" ry="9" fill="url(#metal-grad)" />
  <ellipse cx="360" cy="275" rx="35" ry="7" fill="#000000" fill-opacity="0.2" />
  <path d="M 355 200 L 355 275 L 365 275 L 365 200 Z" fill="url(#metal-grad)" />
  <!-- Mirror Outer Ring -->
  <circle cx="360" cy="170" r="74" fill="url(#metal-grad)" />
  <!-- Mirror Inner Glass -->
  <circle cx="360" cy="170" r="68" fill="url(#mirror-glass-grad)" />

  <!-- Mirror Glass Inner Shine / Grid (Decorative) -->
  <g clip-path="url(#mirror-clip)">
    <!-- Diagonal grid pattern or cyber lines in mirror background -->
    <line x1="280" y1="200" x2="440" y2="120" stroke="#38bdf8" stroke-opacity="0.15" stroke-width="2" />
    <line x1="280" y1="240" x2="440" y2="160" stroke="#38bdf8" stroke-opacity="0.15" stroke-width="2" />
    <line x1="280" y1="160" x2="440" y2="80" stroke="#38bdf8" stroke-opacity="0.15" stroke-width="2" />
  </g>

  <!-- ==================== FOLDER CHARACTER DEFINITION (REAL) ==================== -->
  <g id="real-folder">
    <!-- Folder Tab (Back) -->
    <path d="M 145 165 L 145 150 C 145 144, 150 144, 154 144 L 190 144 C 194 144, 199 144, 199 152 L 199 165 Z" fill="url(#tab-grad)" />
    
    <!-- Folder Back Flap -->
    <rect x="135" y="152" width="110" height="110" rx="10" fill="url(#folder-grad)" />
    
    <!-- Papers sticking out -->
    <!-- Paper 1 (White) -->
    <path d="M 152 160 L 165 125 C 166 122, 172 122, 174 125 L 205 160 Z" fill="#FFFFFF" fill-opacity="0.9" />
    <!-- Paper 2 (Light Pink) -->
    <path d="M 175 160 L 192 120 C 193 117, 199 117, 201 120 L 230 160 Z" fill="#FFE4E6" fill-opacity="0.95" />
    <!-- Paper 3 (Cyan/Data) -->
    <path d="M 195 160 L 210 130 C 211 127, 216 127, 218 130 L 240 160 Z" fill="#E0F2FE" />
    
    <!-- Folder Front Flap -->
    <path d="M 135 180 C 135 172, 141 166, 149 166 L 231 166 C 239 166, 245 172, 245 180 L 245 252 C 245 260, 239 266, 231 266 L 149 266 C 141 266, 135 260, 135 252 Z" fill="url(#folder-grad)" />
    <!-- Front Flap Line Detail -->
    <path d="M 135 185 L 245 185" stroke="#FFFFFF" stroke-opacity="0.15" stroke-width="2" />

    <!-- Cute Legs -->
    <path d="M 158 262 L 158 276 C 158 280, 166 280, 166 276 L 166 262 Z" fill="#FF7E40" />
    <path d="M 214 262 L 214 276 C 214 280, 222 280, 222 276 L 222 262 Z" fill="#FF7E40" />

    <!-- Left Arm (Resting) -->
    <path d="M 137 218 C 124 218, 124 228, 137 230" fill="none" stroke="#FF7E40" stroke-width="8" stroke-linecap="round" />

    <!-- Face Elements -->
    <!-- Eyes -->
    <circle cx="205" cy="205" r="6" fill="#1e1b4b" />
    <circle cx="228" cy="205" r="6" fill="#1e1b4b" />
    <!-- Shiny Eye Highlights -->
    <circle cx="207" cy="203" r="2.2" fill="#FFFFFF" />
    <circle cx="230" cy="203" r="2.2" fill="#FFFFFF" />
    
    <!-- Eyelashes (Cute detail) -->
    <path d="M 209 199 C 212 198, 213 199, 213 199" fill="none" stroke="#1e1b4b" stroke-width="1.5" stroke-linecap="round" />
    <path d="M 232 199 C 235 198, 236 199, 236 199" fill="none" stroke="#1e1b4b" stroke-width="1.5" stroke-linecap="round" />

    <!-- Blush Cheeks -->
    <ellipse cx="195" cy="214" rx="8" ry="4.5" fill="#FF8A9F" fill-opacity="0.65" />
    <ellipse cx="237" cy="214" rx="8" ry="4.5" fill="#FF8A9F" fill-opacity="0.65" />

    <!-- Happy Open Mouth -->
    <path d="M 213 212 Q 216.5 220, 220 212" fill="none" stroke="#1e1b4b" stroke-width="2.5" stroke-linecap="round" />

    <!-- Right Arm holding Lipstick -->
    <!-- Arm reaching to face -->
    <path d="M 243 226 C 256 226, 255 210, 238 210" fill="none" stroke="#FF7E40" stroke-width="8" stroke-linecap="round" />
    <!-- Hand -->
    <circle cx="238" cy="210" r="4.5" fill="#FF7E40" />
    
    <!-- Lipstick Accessory -->
    <g transform="translate(236, 207) rotate(-35)">
      <!-- Lipstick Case -->
      <rect x="-3" y="-8" width="6" height="10" rx="1.5" fill="#374151" />
      <rect x="-3" y="-10" width="6" height="2" fill="#F3F4F6" />
      <!-- Lipstick Tip (Pink) -->
      <path d="M -2.5 -10 L 2.5 -10 L 1 -15 L -2 -15 Z" fill="#FF2E93" />
    </g>
  </g>

  <!-- ==================== MIRROR REFLECTION (SYNCHRONIZED COPY) ==================== -->
  <g clip-path="url(#mirror-clip)">
    <!-- Mirror reflection container - translated and scaled negatively to mirror -->
    <g transform="translate(360, 168) scale(-0.95, 0.95) translate(-190, -205)">
      <!-- We reuse the identical folder group to show perfect sync! -->
      <use href="#real-folder" />
    </g>
    
    <!-- Soft blue glow overlay on reflection to give a glassy/holographic look -->
    <circle cx="360" cy="170" r="68" fill="#38BDF8" fill-opacity="0.08" pointer-events="none" />
    
    <!-- Glass Diagonal Shine reflection -->
    <path d="M 295 150 L 390 102 L 415 110 L 305 170 Z" fill="#FFFFFF" fill-opacity="0.15" />
    <path d="M 330 220 L 420 175 L 425 185 L 335 230 Z" fill="#FFFFFF" fill-opacity="0.08" />
  </g>

  <!-- Sparkles of beauty/sync (floating stars) -->
  <!-- Sparkle 1 (Gold, left top) -->
  <path d="M 110 110 Q 110 120, 120 120 Q 110 120, 110 130 Q 110 120, 100 120 Q 110 120, 110 110 Z" fill="#FFE57F" />
  <!-- Sparkle 2 (Cyan, center top) -->
  <path d="M 270 90 Q 270 98, 278 98 Q 270 98, 270 106 Q 270 98, 262 98 Q 270 98, 270 90 Z" fill="#67e8f9" />
  <!-- Sparkle 3 (Pink, mirror right top) -->
  <path d="M 445 80 Q 445 88, 453 88 Q 445 88, 445 96 Q 445 88, 437 88 Q 445 88, 445 80 Z" fill="#f472b6" />
  <!-- Sparkle 4 (Gold, mirror left bottom) -->
  <path d="M 290 250 Q 290 256, 296 256 Q 290 256, 290 262 Q 290 256, 284 256 Q 290 256, 290 250 Z" fill="#FFE57F" opacity="0.8" />
  
  <!-- Sync connection dots from folder to mirror (symbolizing communication) -->
  <path d="M 255 200 Q 275 195, 292 200" fill="none" stroke="#67e8f9" stroke-width="2.5" stroke-dasharray="4,4" stroke-linecap="round" opacity="0.6" />
  
  <!-- ==================== RIGHT SIDE: WORDMARK & TAGLINE ==================== -->

  <!-- Version/Status Badge -->
  <g transform="translate(625, 80)">
    <rect x="0" y="0" width="105" height="24" rx="12" fill="#1e1b4b" stroke="#312e81" stroke-width="1.5" />
    <!-- Glowing green dot -->
    <circle cx="16" cy="12" r="4" fill="#10B981" />
    <circle cx="16" cy="12" r="7" fill="#10B981" fill-opacity="0.4" />
    <text x="28" y="16" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="800" fill="#a5b4fc" letter-spacing="1px">PRO ACTIVE</text>
  </g>

  <!-- Wordmark "ProSync" -->
  <text x="625" y="168" font-family="system-ui, -apple-system, sans-serif" font-size="78" font-weight="900" fill="#FFFFFF" letter-spacing="-1.5px">Pro<tspan fill="url(#brand-grad)">Sync</tspan></text>

  <!-- Tagline -->
  <text x="627" y="210" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="500" fill="#94a3b8" letter-spacing="0.2px">Intelligent backup synchronization</text>

  <!-- Sync Icon (Right of Wordmark) -->
  <g transform="translate(935, 132)">
    <!-- Glow behind icon -->
    <circle cx="0" cy="0" r="25" fill="#3B82F6" opacity="0.15" filter="url(#glow-blur)" />
    
    <!-- Top/Left Arrow (Cyan) -->
    <path d="M -18 0 A 18 18 0 0 1 12 -12 L 12 -19 L 24 -7 L 12 5 L 12 -2 A 12 12 0 0 0 -12 0 Z" fill="#06B6D4" />
    <!-- Bottom/Right Arrow (Orange/Pink) -->
    <path d="M 18 0 A 18 18 0 0 1 -12 12 L -12 19 L -24 7 L -12 -5 L -12 2 A 12 12 0 0 0 12 0 Z" fill="#FF8A00" />
  </g>

  <!-- File Sync Mini Graphic (Far Right Decorative) -->
  <g transform="translate(1030, 135)" opacity="0.65">
    <!-- Source File -->
    <rect x="0" y="0" width="20" height="26" rx="4" fill="none" stroke="#475569" stroke-width="2" />
    <line x1="5" y1="8" x2="15" y2="8" stroke="#475569" stroke-width="2" stroke-linecap="round" />
    <line x1="5" y1="13" x2="12" y2="13" stroke="#475569" stroke-width="2" stroke-linecap="round" />
    
    <!-- Sync Arrow -->
    <path d="M 26 13 L 34 13" fill="none" stroke="#FF7E40" stroke-width="2" stroke-linecap="round" />
    <path d="M 31 9 L 35 13 L 31 17" fill="none" stroke="#FF7E40" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />

    <!-- Destination File (Synced) -->
    <rect x="42" y="0" width="20" height="26" rx="4" fill="none" stroke="#FF2E93" stroke-width="2" />
    <line x1="47" y1="8" x2="57" y2="8" stroke="#FF2E93" stroke-width="2" stroke-linecap="round" />
    <line x1="47" y1="13" x2="54" y2="13" stroke="#FF2E93" stroke-width="2" stroke-linecap="round" />
  </g>

  <g transform="translate(1030, 185)" opacity="0.65">
    <!-- Synced status lines/nodes -->
    <circle cx="10" cy="10" r="3" fill="#67e8f9" />
    <line x1="13" y1="10" x2="35" y2="10" stroke="#475569" stroke-width="1.5" stroke-dasharray="2,2" />
    <circle cx="38" cy="10" r="3" fill="#FF2E93" />
    
    <text x="24" y="24" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="700" fill="#475569" text-anchor="middle" letter-spacing="0.5px">AUTO</text>
  </g>

</svg>
